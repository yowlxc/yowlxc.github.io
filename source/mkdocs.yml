site_name: Портофолио Пироговой Анастасии 
site_url: https://yowlxc.github.io/
site_author: Pirogova Anastasia
copyright: Pirogova Anastasia, yowlxc, 2026

theme:
  name: material
  features:
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему

markdown_extensions:
  - attr_list

extra_css:
  - stylesheets/extra.css

nav:
  - Главная: index.md
  - Обо мне: about.md
  - Мои проекты: projects.md
  - Мои контакты: contacts.md
  


