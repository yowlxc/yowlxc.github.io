  - type: "content-layout-block"
    textWidth: "m"
    centered: true
    title: "Что такое SourceCraft Sites?"
    text: |
      SourceCraft Sites — это сервис для хостинга статических сайтов, похожий по функциональности на GitHub Pages. Он позволяет разработчикам и дизайнерам публиковать HTML, CSS и JavaScript проекты прямо из репозиториев SourceCraft.


      Идеально подходит для:
      - Сайтов-портфолио и резюме
      - Документации проектов
      - Блогов и личных сайтов
      - Лендингов и промо-страниц
      - Демо-версий веб-приложений


      SourceCraft Sites работает на базе надежной облачной инфраструктуры Yandex Cloud, обеспечивая быструю загрузку и высокую доступность ваших сайтов.

  - type: "card-layout-block"
    title: "Как запустить свой сайт на SourceCraft Sites"
    description: "Всего несколько простых шагов — и ваш сайт будет доступен в интернете"
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 6
    children:
      - type: "layout-item"
        content:
          title: "1. Создайте репозиторий"
          text: "Зарегистрируйтесь в SourceCraft и создайте новый публичный репозиторий для вашего сайта"
        media:
          image:
            src: "https://storage.yandexcloud.net/cloud-www-assets/pages/yandex-src/dev/7-02.svg"
        border: "line"
      - type: "layout-item"
        content:
          title: "2. Загрузите файлы сайта"
          text: "Добавьте HTML, CSS, JavaScript и другие файлы. Главный файл должен называться index.html"
        media:
          image:
            src: "https://storage.yandexcloud.net/cloud-www-assets/pages/yandex-src/dev/7-04.svg"
        border: "line"
      - type: "layout-item"
        content:
          title: "3. Настройте Sites"
          text: "Создайте файл `.sourcecraft/sites.yaml` с полем `site`, укажите в нём `root` как путь к папке с контентом в репозитории"
        media:
          image:
            src: "https://storage.yandexcloud.net/cloud-www-assets/pages/yandex-src/dev/7-05.svg"
        border: "line"
      - type: "layout-item"
        content:
          title: "4. Ваш сайт готов!"
          text: "Сайт будет доступен по адресу `{org_name}.sourcecraft.site/{repository_name}`"
        media:
          image:
            src: "https://storage.yandexcloud.net/cloud-www-assets/pages/yandex-src/dev/7-07.svg"
        border: "line"

