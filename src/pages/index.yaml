  - type: "questions-block"
    anchor:
      url: "faq"
      text: "FAQ"
    title: "Часто задаваемые вопросы"
    items:
      - title: "Что такое SourceCraft Sites?"
        text: "SourceCraft Sites — это бесплатный сервис для хостинга статических сайтов прямо из ваших репозиториев на платформе SourceCraft."
      - title: "Сколько это стоит?"
        text: "SourceCraft Sites полностью бесплатен для всех пользователей. Нет лимитов на количество сайтов или трафик в рамках разумного использования."
      - title: "Какие типы сайтов можно размещать?"
        text: "Вы можете размещать любые статические сайты: HTML, CSS, JavaScript, изображения. Подойдет для портфолио, блогов, документации, лендингов и демо-версий проектов."
      - title: "Как настроить Sites в репозитории?"
        text: "Создайте файл `sites.yaml` в папке `.sourcecraft` с полем `sites`, которое содержит `root` (путь к папке с контентом) и `ref` (ветку или тег, по умолчанию будет использована основная ветка репозитория)."
      - title: "По какому адресу будет доступен мой сайт?"
        text: "Ваш сайт будет доступен по адресу `{org_name}.sourcecraft.site/{repository_name}`, где `org_name` - слаг организации в SourceCraft , а `repository_name` - название репозитория. Например, для репозитория <https://sourcecraft.dev/sourcecraft/sites-landing> Sites будет расположен по адресу <https://sourcecraft.sourcecraft.site/sites-landing>."
      - title: "Как обновить сайт?"
        text: "Просто внесите изменения в файлы и сделайте push в репозиторий. Содержимое сайта сразу обновится автоматически."
      - title: "Поддерживаются ли статические генераторы сайтов?"
        text: "Да, вы можете использовать любые статические генераторы (Jekyll, Hugo, Gatsby и др.). Загрузите сгенерированные файлы в репозиторий или настройте автоматическую сборку через CI/CD."

