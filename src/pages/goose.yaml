  - type: "questions-block"
    title: "Часто задаваемые гусиные вопросы"
    items:
      - title: "Как найти этот уровень?"
        text: "Это секрет! Но если вы здесь, значит, вы уже его нашли. Гусь доволен вашими навыками."
      - title: "Работает ли SourceCraft Sites с гусиным кодом?"
        text: 'Конечно! SourceCraft Sites поддерживает все виды кода, включая гусиный. Главное - не забывайте комментарии в стиле "га-га".'
      - title: "Можно ли разместить гусиный сайт?"
        text: "Да! Создайте репозиторий с гусиным контентом, и наш главный гусь лично проверит качество кода."
      - title: "Гусь одобряет мой код?"
        text: "Если вы здесь, то да. Гусь особенно любит чистый код, хорошую документацию и отсутствие лапшекода."
      - title: "Секретный гусиный чит-код?"
        text: "Konami Code для гусей: ↑↑↓↓←→←→🦆🦆. Но это работает только в полнолуние."

