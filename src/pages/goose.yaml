  - type: "content-layout-block"
    anchor:
      url: "goose-wisdom"
      text: "Гусиная мудрость"
    title: "Гусиные истины о разработке"
    text: |
      Мудрый гусь знает секреты хорошего кода:


      🦆 **Принцип гусиного програмирования**: Если код выглядит как гусь, гогочет как гусь, то это, вероятно, хороший код.


      🦆 **Гусиная отладка**: Объясните свой код гусю. Если гусь не понимает - код плохой.


      🦆 **Правило гусиного коммита**: Каждый коммит должен быть как гусиный шаг - уверенный и целенаправленный.


      🦆 **Гусиный рефакторинг**: Не трогайте работающий код без уважительной причины. Гусь не любит суету.
    centered: true
    textWidth: "m"

