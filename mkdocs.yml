site_name: Портофолио Пироговой Анастасии 
site_url: https://yowlxc.github.io/
site_author: Pirogova Anastasia
copyright: Pirogova Anastasia, yowlxc, 2026

theme:
  name: material
  palette:
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css

nav:
  - Главная: index.md
  - Обо мне: about.md
  - Мои проекты: projects.md
  - Мои контакты: contacts.md
  


